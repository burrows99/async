name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.24', '1.25', '1.26']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false # zero dependencies — nothing to cache, avoids a go.sum warning
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "These files need gofmt:"; gofmt -l .; exit 1; }

      - name: generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code || { echo "run 'go generate ./...' and commit the result"; exit 1; }

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
