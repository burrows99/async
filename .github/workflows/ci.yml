name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "These files need gofmt:"; gofmt -l .; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race ./...

      - name: generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code || { echo "run 'go generate ./...' and commit the result"; exit 1; }
